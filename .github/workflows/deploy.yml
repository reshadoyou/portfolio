name: Deploy to GitHub Pages

on:
  # Activa el workflow cada vez que se hace push a la rama `main`
  push:
    branches: [ main ]
  # Permite ejecutar este workflow manualmente desde la pestaña Actions en GitHub
  workflow_dispatch:

# Permisos necesarios para clonar el repo y crear un despliegue de páginas
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Construir y preparar para despliegue
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Checkout del repositorio
        uses: actions/checkout@v4
        
      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: 📊 Mostrar información del entorno
        run: |
          echo "Node.js version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "Working directory: $(pwd)"
          echo "Repository structure:"
          ls -la
          
      - name: 🧹 Limpiar caché de npm (si es necesario)
        run: npm cache clean --force
        continue-on-error: true
        
      - name: 📦 Instalar dependencias con reintentos
        run: |
          echo "Intentando instalar dependencias..."
          for i in {1..3}; do
            echo "Intento $i de 3..."
            if npm ci --prefer-offline --no-audit; then
              echo "✓ Dependencias instaladas exitosamente en intento $i"
              break
            else
              echo "❌ Fallo en intento $i"
              if [ $i -eq 3 ]; then
                echo "❌ Error: Falló la instalación después de 3 intentos"
                exit 1
              fi
              echo "Esperando 30 segundos antes del siguiente intento..."
              sleep 30
              echo "Limpiando caché de npm..."
              npm cache clean --force
            fi
          done
          
      - name: ✅ Verificar instalación de dependencias
        run: |
          echo "Verificando package.json y node_modules..."
          test -f package.json && echo "✓ package.json encontrado"
          test -d node_modules && echo "✓ node_modules instalado"
          echo "Dependencias principales instaladas:"
          npm list --depth=0
          
      - name: 🏗️ Construir proyecto con Astro
        run: |
          echo "Iniciando build de Astro..."
          npm run build
          echo "Build completado exitosamente"
          
      - name: 🔍 Verificar resultado del build
        run: |
          echo "Verificando contenido de la carpeta dist..."
          if [ -d "dist" ]; then
            echo "✓ Carpeta dist generada correctamente"
            echo "Contenido de dist/:"
            ls -la dist/
            echo "Tamaño total del dist:"
            du -sh dist/
            # Verificar que index.html existe
            if [ -f "dist/index.html" ]; then
              echo "✓ index.html encontrado"
              echo "Tamaño de index.html: $(wc -c < dist/index.html) bytes"
            else
              echo "❌ Error: index.html no encontrado en dist/"
              exit 1
            fi
          else
            echo "❌ Error: La carpeta dist no fue generada"
            exit 1
          fi
          
      - name: 📤 Subir artifact para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Desplegar a GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
